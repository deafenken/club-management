version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: club-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-club_management}
    ports:
      - "127.0.0.1:3306:3306"   # Only localhost on ECS, NOT public
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/tmp/init.sql:ro
      - ./sql/migration_v2.sql:/tmp/migration_v2.sql:ro
      - ./sql/upgrade_notification.sql:/tmp/upgrade_notification.sql:ro
      - ./sql/seed_more.sql:/tmp/seed_more.sql:ro
      - ./sql/seed_users.sql:/tmp/seed_users.sql:ro
      - ./sql/seed_approved_data.sql:/tmp/seed_approved_data.sql:ro
      - ./sql/seed_demo_applications.sql:/tmp/seed_demo_applications.sql:ro
      - ./sql/fix_phones.sql:/tmp/fix_phones.sql:ro
      - ./sql/docker-init.sh:/docker-entrypoint-initdb.d/01-init.sh
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - club-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: club-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-club_management}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7200000}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_API_URL: ${LLM_API_URL:-https://api.deepseek.com/v1/chat/completions}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-120000}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-3}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    ports:
      - "127.0.0.1:8080:8080"   # Only localhost on ECS
    networks:
      - club-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: club-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"   # Publicly accessible
    networks:
      - club-network

networks:
  club-network:
    driver: bridge

volumes:
  mysql-data:
