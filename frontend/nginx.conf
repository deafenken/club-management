server {
    listen       80;
    server_name  _;

    # Character set
    charset utf-8;

    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # Reverse proxy: /api requests go to backend
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Timeouts for AI endpoints (LLM may take 120s+)
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback: serve index.html for all non-file, non-api routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (they have hashed filenames from Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
