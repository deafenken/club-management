server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:club_management}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&connectTimeout=5000
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:club-management-system-2026-secret-key-very-long-enough}
  expiration: ${JWT_EXPIRATION:7200000}

llm:
  provider: ${LLM_PROVIDER:deepseek}                   # deepseek / anthropic
  api:
    key: ${LLM_API_KEY:}
    url: ${LLM_API_URL:https://api.deepseek.com/v1/chat/completions}
    model: ${LLM_MODEL:deepseek-chat}
    timeout: ${LLM_TIMEOUT:120000}
    max-retries: ${LLM_MAX_RETRIES:3}

langfuse:
  enabled: ${LANGFUSE_ENABLED:false}
  public-key: ${LANGFUSE_PUBLIC_KEY:}
  secret-key: ${LANGFUSE_SECRET_KEY:}
  host: ${LANGFUSE_HOST:https://cloud.langfuse.com}
